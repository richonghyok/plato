[clients]

# Type
type = "simple"

# The total number of clients
total_clients = 2

# The number of clients selected in each round
per_round = 2

# Should the clients compute test accuracy locally?
do_test = true

[server]
address = "127.0.0.1"
port = 8002
simulate_wall_time = false
checkpoint_path = "checkpoints/lerobot/smolvla_full_finetune"
model_path = "models/lerobot/smolvla_full_finetune"

[data]
include = "lerobot_datasource_base.toml"

[trainer]

# The type of the trainer
type = "lerobot"

# The maximum number of training rounds
rounds = 10

# The maximum number of clients running concurrently
max_concurrency = 1

# The machine learning model
model_type = "smolvla"
model_name = "smolvla"

# Number of epoches for local training in each communication round
epochs = 5

# SmolVLA upstream fine-tuning guidance uses batch size 64.
batch_size = 64
optimizer = "AdamW"

[algorithm]

# Aggregation algorithm
type = "fedavg"

[parameters]

[parameters.policy]
type = "smolvla"
path = "lerobot/smolvla_base"
finetune_mode = "full"
precision = "bf16"
device = "cuda"

[parameters.dataset]
repo_id = "lerobot/pusht_image"
split_seed = 7
train_split = 0.9
task_aware_split = true
task_aware_partition = true
delta_timestamps = { observation_image = [-0.2, -0.1, 0.0] }

[parameters.transforms]
image_size = [224, 224]
center_crop = true
normalize = true
interpolation = "bilinear"

[parameters.optimizer]
lr = 0.0001
weight_decay = 0.01
